version: '3.9'

services:
  fraudintel-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fraudintel-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - fraudintel-data:/app/data
      - fraudintel-models:/app/ml/models/saved_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - fraudintel-net

  # Uncomment for Kafka streaming support
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #   networks: [fraudintel-net]

  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   depends_on: [zookeeper]
  #   ports: ["9092:9092"]
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #   networks: [fraudintel-net]

volumes:
  fraudintel-data:
  fraudintel-models:

networks:
  fraudintel-net:
    driver: bridge
